name: ci

on:
    push:
        branches: [dev]
    pull_request:

jobs:
    test:
        runs-on: ubuntu-latest

        permissions:
            contents: read

        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Set up Go
              uses: actions/setup-go@v6
              with:
                  go-version: "1.25.4"
                  cache: true

            - name: Build
              run: go build ./...

            - name: Run tests with coverage and JSON report
              run: |
                  go test -v -covermode=atomic -coverprofile=coverage.out -json ./... > test-report.json

            - name: Create coverage summary
              if: always()
              run: |
                  if [ -f coverage.out ]; then
                    go tool cover -func=coverage.out | tee coverage-summary.txt
                  fi

            - name: Add workflow summary
              if: always()
              run: |
                  echo "## Go CI summary" >> "$GITHUB_STEP_SUMMARY"
                  echo "" >> "$GITHUB_STEP_SUMMARY"

                  if [ -f coverage-summary.txt ]; then
                    echo "### Coverage" >> "$GITHUB_STEP_SUMMARY"
                    echo '```text' >> "$GITHUB_STEP_SUMMARY"
                    cat coverage-summary.txt >> "$GITHUB_STEP_SUMMARY"
                    echo '```' >> "$GITHUB_STEP_SUMMARY"
                  else
                    echo "No coverage summary produced." >> "$GITHUB_STEP_SUMMARY"
                  fi

                  if [ -f test-report.json ]; then
                    echo "" >> "$GITHUB_STEP_SUMMARY"
                    echo "JSON test report saved as workflow artifact: \`go-test-artifacts\`." >> "$GITHUB_STEP_SUMMARY"
                  fi

            - name: Upload test artifacts
              if: always()
              uses: actions/upload-artifact@v7
              with:
                  name: go-test-artifacts
                  path: |
                      coverage.out
                      coverage-summary.txt
                      test-report.json
                  if-no-files-found: ignore
                  retention-days: 7

            - name: Upload coverage to Codecov
              if: success()
              uses: codecov/codecov-action@v5
              with:
                  files: coverage.out
                  disable_search: true
                  fail_ci_if_error: true
                  verbose: true
                  token: ${{ secrets.CODECOV_TOKEN }}
                  plugins: noop
